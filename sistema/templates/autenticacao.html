{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — Sistema</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f7f8fc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-wrap {
            width: 100%;
            max-width: 380px;
        }
        .login-brand {
            font-size: 0.9375rem;
            font-weight: 600;
            color: #111827;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            display: block;
        }
        .login-card {
            background: #fff;
            border: 1px solid #e4e4e7;
            border-radius: 14px;
            padding: 2rem;
        }
        .login-title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: #111827;
            margin: 0 0 0.25rem;
        }
        .login-sub {
            font-size: 0.8125rem;
            color: #6b7280;
            margin: 0 0 1.75rem;
        }
        .form-label {
            font-size: 0.8125rem;
            font-weight: 500;
            color: #111827;
            margin-bottom: 0.35rem;
            display: block;
        }
        .form-control {
            width: 100%;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            padding: 0.6rem 0.875rem;
            font-size: 0.875rem;
            font-family: inherit;
            background: #fafafa;
            color: #111827;
            outline: none;
            transition: border-color 0.12s;
        }
        .form-control:focus { border-color: #3b5bdb; background: #fff; }
        .form-group { margin-bottom: 1rem; }
        .btn-login {
            width: 100%;
            background: #3b5bdb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.65rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.12s;
        }
        .btn-login:hover { background: #2f4cc5; }
        .alert-error {
            font-size: 0.8125rem;
            border: 1px solid #fca5a5;
            background: #fef2f2;
            color: #991b1b;
            padding: 0.65rem 0.875rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <span class="login-brand">Sistema</span>
        <div class="login-card">
            <h1 class="login-title">Bem-vindo</h1>
            <p class="login-sub">Insira suas credenciais para continuar</p>

            {% if mensagem %}
                <div class="alert-error">{{ mensagem }}</div>
            {% endif %}

            <form action="{% url 'login' %}" method="POST" novalidate>
                {% csrf_token %}
                <div class="form-group">
                    <label for="usuario" class="form-label">Usuário</label>
                    <input type="text" id="usuario" name="usuario"
                           class="form-control" placeholder="Digite seu usuário"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" id="senha" name="senha"
                           class="form-control" placeholder="Digite sua senha"
                           required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
