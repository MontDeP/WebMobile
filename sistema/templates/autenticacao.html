<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login sistema</title>
    <link type="text/css" rel="stylesheet" href="{% static 'bootstrap-5.3.8-dist/css/bootstrap.css' %}">
    <script type="text/javascript" src="{% static 'bootstrap-5.3.8-dist/js/bootstrap.js' %}"></script>
</head>
<body>
   <div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4" style="width: 350px; border-radius: 15px;">

    <h3 class="text-center mb-4">Login</h3>

    <form action="/" method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Usuário</label>
        <input 
          type="text" 
          name="usuario" 
          class="form-control" 
          placeholder="Digite seu usuário" 
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input 
          type="password" 
          name="senha" 
          class="form-control" 
          placeholder="Digite sua senha" 
          required>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        Entrar
      </button>

    </form>

  </div>

</div>

</body>
</html>
