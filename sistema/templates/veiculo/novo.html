{% extends 'base.html' %}
{% block title %}Novo Veículo{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">

            <div class="mb-4">
                <h1 style="font-size:1.125rem; font-weight:600; letter-spacing:-0.02em; margin:0 0 0.25rem;">
                    Novo Veículo
                </h1>
                <p style="font-size:0.8125rem; color:var(--muted); margin:0;">
                    Preencha as informações do veículo
                </p>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <form action="{% url 'criar-veiculo' %}" method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <div style="font-size:0.75rem; color:#dc2626; margin-top:0.25rem;">
                                        {{ field.errors }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">Salvar</button>
                            <a href="{% url 'listar-veiculos' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
