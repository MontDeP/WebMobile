{% extends 'base.html' %}
{% block title %}Excluir Anúncio{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card text-center">
                <div class="card-body p-5">
                    <div style="width:48px; height:48px; background:#fef2f2; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:1.25rem;">
                        <i class="bi bi-trash" style="font-size:1.25rem; color:#dc2626;"></i>
                    </div>
                    <h5 style="font-weight:600; letter-spacing:-0.01em; margin-bottom:0.5rem;">
                        Excluir anúncio?
                    </h5>
                    <p style="font-size:0.8125rem; color:var(--muted); margin-bottom:2rem;">
                        Você está prestes a excluir <strong>{{ object.titulo }}</strong>.
                        Esta ação não pode ser desfeita.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="submit" class="btn btn-danger">Confirmar exclusão</button>
                            <a href="{% url 'listar-anuncios' %}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
